<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Shared Stylesheets -->
    <link rel="stylesheet" type="text/css" href="usercss/bootstrap.min.css" />
    <link rel="stylesheet" type="text/css" href="usercss/font-awesome.min.css" />
    <link rel="stylesheet" type="text/css" href="usercss/style.css" />
    <link rel="stylesheet" type="text/css" href="usercss/menu-style.css" />
    <link rel="stylesheet" type="text/css" href="usercss/animate.min.css" />
    
    <script language="javascript" type="text/javascript">
        window.onload = pageforward;
        function pageforward() {
            history.forward(1);
            txt_focus();
            return false;
        }
        function goback() {
            history.back(1);
        } 
        function trim(string) {
            while (string.substr(0, 1) == " ")
                string = string.substring(1, string.length);
            while (string.substr(string.length - 1, 1) == " ")
                string = string.substring(0, string.length - 2);
            return string;
        }
        function checkblank() {
            var txt1 = document.getElementById("username");
            var txt2 = document.getElementById("passwd");
            if (txt1.value == "" || txt1.value == "User Name") {
                alert("Blank User Name");
                return false;
            }
            if (txt2.value == "" || txt2.value == "Password") {
                alert("Blank Password");
                return false;
            }
            return true;
        }
        function txt_focus() {
            document.getElementById("passwd").value = "";
            document.getElementById("username").value = "";
            document.getElementById("username").focus();
        }
        function RefreshCaptcha() {
            var img = document.getElementById("imgCaptcha");
            img.src = "Handler.ashx?query=" + Math.random();
        }
    </script>
</head>
<body class="login-bg d-flex align-items-center justify-content-center" style="min-height: 100vh; background-color: var(--bg-color); font-family: 'Inter', sans-serif;">

            <input type="hidden" name="__EVENTARGUMENT" id="__EVENTARGUMENT" value="" />
            <input type="hidden" name="__VIEWSTATE" id="__VIEWSTATE" value="/wEPDwUKMTU3ODQ5ODYzOA9kFgYCAw8PFgIeCEltYWdlVXJsBSVodHRwczovL3dlYnRlbC5pbi9tYWlsbG9nby9DQUxvZ28ucG5nZGQCBQ8WAh4JaW5uZXJodG1sBRVLTk1DICZhbXA7IEFTU09DSUFURVNkAgcPZBYCAgEPDxYCHgRUZXh0ZWRkZNGQYjdeJTFbl2qCSKRthgkhvhJg2s0+tzgU6RDo8JvH" />

            <input type="hidden" name="__EVENTVALIDATION" id="__EVENTVALIDATION" value="/wEdAAVHTwT9xCljSMoc4U4WHY5dKhoCyVdJtLIis5AgYZ/RYULWkrvPKXekN8WJfP1NBw/EmIbn9tQCGmOOWdQ6FuKZdqQsUjd5IAlKaHQJ80vpScVUCBeDUdKwTjndArpId205bpVA7fw9enoFmXb4tAbL" />
                        </div>
                        
                        <div class="row g-4">
                            <!-- Username -->
                            <div class="col-12">

                                <div class="input-group">

                                    <input name="username" type="text" id="username" class="form-control premium-input border-start-0 ps-0" placeholder="Enter username" required />
                                </div>
                            </div>
                            
                            <!-- Password -->
                            <div class="col-12">

                            <!-- Captcha Image and Input -->

                            <!-- Submit Button -->

                                    Log In
                                </button>
                            </div>

                    </form>

    </div>
    
    <script type="text/javascript">
        var theForm = document.forms['form1'];
        if (!theForm) {
            theForm = document.form1;
        }
        function __doPostBack(eventTarget, eventArgument) {
            if (!theForm.onsubmit || (theForm.onsubmit() != false)) {
                theForm.__EVENTTARGET.value = eventTarget;
                theForm.__EVENTARGUMENT.value = eventArgument;
                theForm.submit();
            }
        }
    </script>
</body>
</html>
