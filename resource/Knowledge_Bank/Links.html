<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="rewritten" content="true">
    <title>Links Directory | KNMC & Associates</title>
    <link rel="shortcut icon" href="../../image/favicon.ico" />
    
    <!-- Shared Stylesheets -->
    <link rel="stylesheet" type="text/css" href="../../usercss/bootstrap.min.css" />
    <link rel="stylesheet" type="text/css" href="../../usercss/font-awesome.min.css" />
    <link rel="stylesheet" type="text/css" href="../../usercss/style.css" />
    <link rel="stylesheet" type="text/css" href="../../usercss/menu-style.css" />
    <link rel="stylesheet" type="text/css" href="../../usercss/animate.min.css" />
</head>
<body class="intro-head-active">
    <div id="preloader"><div class="loader-wrapper"><div class="loader-graphic"><div class="spinner-ring"><div></div><div></div></div><div class="loader-logo"><span class="logo-text">CA</span></div></div><h2 class="loader-title">KNMC</h2><p class="loader-subtitle">Associates</p><div class="loader-bar-container"><div class="loader-bar"></div></div><p class="loader-status">Chartered Accountants</p></div></div>

    <!-- Global Header Placeholder -->
    <div id="global-header-marker"></div>

    <!-- Inner Page Header -->
    <section class="innr-pg-c">
        <div class="container">
            <div class="row">
                <div class="col-12">
                    <div class="kb-breadcrumb mb-2">
                        <a href="../../index.html">Home</a> &gt; <a href="../Knowledge_Bank.html">Knowledge Bank</a> &gt; <span>Links</span>
                    </div>
                    <h1>Quick Links</h1>
                </div>
            </div>
        </div>
    </section>

    <!-- Main Content Section -->
    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-10 col-12">
                
                <!-- Category Controls -->
                <div class="row g-3 align-items-center mb-5">
                    <div class="col-md-6 col-12">
                        <div class="input-group">
                            <span class="input-group-text bg-white"><i class="fa fa-search text-muted"></i></span>
                            <input type="text" id="catSearch" class="form-control" placeholder="Search links on this page...">
                        </div>
                    </div>
                    <div class="col-md-6 col-12 text-md-end">
                        <button class="btn btn-sm btn-outline-secondary alpha-btn px-3" onclick="sortList('asc')">A &rarr; Z</button>
                        <button class="btn btn-sm btn-outline-secondary alpha-btn px-3 ms-2" onclick="sortList('desc')">Z &rarr; A</button>
                    </div>
                </div>

                <!-- Subcategories Accordion -->
                <div class="accordion" id="linksAccordion">
                    
                    <!-- 1. Resource Links -->
                    <div class="accordion-item mb-3 border rounded shadow-sm overflow-hidden">
                        <h2 class="accordion-header" id="headingLinks">
                            <button class="accordion-button fs-5 fw-bold" type="button" data-bs-toggle="collapse" data-bs-target="#collapseLinks" aria-expanded="true" aria-controls="collapseLinks">
                                <i class="fa fa-external-link text-primary me-2"></i> Reference Links
                            </button>
                        </h2>
                        <div id="collapseLinks" class="accordion-collapse collapse show" aria-labelledby="headingLinks" data-bs-parent="#linksAccordion">
                            <div class="accordion-body bg-white p-0">
                                <ul class="list-group list-group-flush" id="listLinks">
                                    <li class="list-group-item p-3" data-name="Quick Links"><a href="../../resources/Links/Quick_Link/Quick_Link.html" class="d-flex justify-content-between align-items-center text-decoration-none text-dark"><span>Quick Links (Income Tax, MCA, PF, ESI, VAT)</span> <i class="fa fa-chevron-right text-muted small"></i></a></li>
                                    <li class="list-group-item p-3" data-name="Important Links"><a href="../../resources/Links/important_links/important_links.html" class="d-flex justify-content-between align-items-center text-decoration-none text-dark"><span>Important Links</span> <i class="fa fa-chevron-right text-muted small"></i></a></li>
                                    <li class="list-group-item p-3" data-name="GST/VAT Links"><a href="../../resources/Links/Vat_Links/Vat_Links.html" class="d-flex justify-content-between align-items-center text-decoration-none text-dark"><span>GST/VAT Links</span> <i class="fa fa-chevron-right text-muted small"></i></a></li>
                                    <li class="list-group-item p-3" data-name="Ease Of Doing Business"><a href="../../resources/Links/EASE_OF_DOING_BUSINESS/EASE_OF_DOING_BUSINESS.html" class="d-flex justify-content-between align-items-center text-decoration-none text-dark"><span>Ease Of Doing Business Portals</span> <i class="fa fa-chevron-right text-muted small"></i></a></li>
                                </ul>
                            </div>
                        </div>
                    </div>

                </div>

                <div id="emptyState" class="text-center py-5 d-none">
                    <i class="fa fa-search text-muted fs-1 mb-3"></i>
                    <h5>No Links Found</h5>
                    <p class="text-muted small">Try refining your search terms.</p>
                </div>

            </div>
        </div>
    </main>

    <!-- Global Footer Placeholder -->
    <div id="global-footer-marker"></div>

    <!-- Scripts -->
    <script src="../../usercss/apopper.min.js"></script>
    <script src="../../usercss/bootstrap.min.js"></script>
    
    <script>
        // Real-time search filter
        const searchInput = document.getElementById('catSearch');
        const listItems = document.querySelectorAll('.list-group-item');
        const accordionItems = document.querySelectorAll('.accordion-item');
        const emptyState = document.getElementById('emptyState');

        searchInput.addEventListener('input', function() {
            const query = this.value.trim().toLowerCase();
            let totalVisible = 0;

            accordionItems.forEach(item => {
                const lis = item.querySelectorAll('.list-group-item');
                let groupVisible = 0;

                lis.forEach(li => {
                    const name = li.getAttribute('data-name').toLowerCase();
                    if (name.includes(query)) {
                        li.classList.remove('d-none');
                        groupVisible++;
                        totalVisible++;
                    } else {
                        li.classList.add('d-none');
                    }
                });

                if (groupVisible > 0) {
                    item.classList.remove('d-none');
                    if (query.length > 0) {
                        const collapseEl = item.querySelector('.accordion-collapse');
                        const bsCollapse = bootstrap.Collapse.getOrCreateInstance(collapseEl, { toggle: false });
                        bsCollapse.show();
                    }
                } else {
                    item.classList.add('d-none');
                }
            });

            if (totalVisible === 0) {
                emptyState.classList.remove('d-none');
            } else {
                emptyState.classList.add('d-none');
            }
        });

        // Alphabetical sorting
        function sortList(direction) {
            const lists = document.querySelectorAll('.list-group');
            lists.forEach(list => {
                const items = Array.from(list.querySelectorAll('.list-group-item'));
                items.sort((a, b) => {
                    const nameA = a.getAttribute('data-name').toLowerCase();
                    const nameB = b.getAttribute('data-name').toLowerCase();
                    if (direction === 'asc') {
                        return nameA.localeCompare(nameB);
                    } else {
                        return nameB.localeCompare(nameA);
                    }
                });
                items.forEach(item => list.appendChild(item));
            });
        }
    </script>
</body>
</html>
